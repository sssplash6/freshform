# Render Blueprint for Freshman Academy (freshform).
# Deploy: Render dashboard → New → Blueprint → point at this repo.
#
# This is a stateful Node web service: it stores data in a SQLite file on a
# persistent disk, so it runs as a SINGLE instance (SQLite is single-writer).
services:
  - type: web
    name: freshform
    runtime: node
    plan: starter # required — persistent disks are not available on Free
    numInstances: 1 # must stay 1: SQLite cannot be shared across instances

    # Use `npm install`, not `npm ci`: the lockfile is generated on macOS and
    # omits Linux-only optional deps (@emnapi/*, wasm fallbacks for Tailwind's
    # native oxide), which makes strict `npm ci` fail on Render's Linux build.
    # devDependencies (typescript, tailwind, tsx) are needed to build and to
    # run the seed, so force-install them even though Render sets production.
    buildCommand: npm install --include=dev && npm run build
    # Apply migrations and (idempotently) seed the disk before starting.
    startCommand: npm run db:migrate:deploy && npm run db:seed && npm start

    # Persistent storage for the SQLite database. Wiped-on-deploy without this.
    disk:
      name: freshform-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        value: file:/data/app.db
      # Set after the first deploy, once you know the service URL:
      #   https://<your-service>.onrender.com
      - key: NEXTAUTH_URL
        sync: false
      # Render generates a strong secret on first deploy.
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Shared with the cron job below; guards /api/cron/* endpoints.
      - key: CRON_SECRET
        generateValue: true
      # From Google Cloud console → APIs & Services → Credentials.
      # Add redirect URI: <NEXTAUTH_URL>/api/auth/callback/google
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  # Daily deadline reminders. The SQLite disk belongs to the web service, so
  # the cron job can't touch the database directly — it calls the app's
  # authenticated cron endpoint instead and the web service does the work.
  # 04:00 UTC = 09:00 in Tashkent.
  - type: cron
    name: freshform-deadline-reminders
    runtime: node
    plan: starter
    schedule: "0 4 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -fsS --retry 3 --retry-delay 10
      -H "Authorization: Bearer $CRON_SECRET"
      "$APP_URL/api/cron/deadline-reminders"
    envVars:
      # NOTE: do NOT use `property: host` here — it returns the service's INTERNAL
      # private-network hostname (e.g. "freshform-srma"), which has no public TLS
      # listener, so curl to https://<that>:443 fails with "couldn't connect".
      # Use the public custom domain directly.
      - key: APP_URL
        value: "https://freshlog.net"
      - key: CRON_SECRET
        fromService:
          type: web
          name: freshform
          envVarKey: CRON_SECRET
